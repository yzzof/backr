name: Rust Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes

  build:
    needs: release # Wait for the release to be created first
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: backr
            asset_name: backr-x86_64-unknown-linux-gnu
          - os: windows-latest
            artifact_name: backr.exe
            asset_name: backr-x86_64-pc-windows-msvc.exe

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build with Cargo
        run: cargo build --release

      - name: Upload Asset to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Rename the binary to include the platform name before uploading
          mv target/release/${{ matrix.artifact_name }} ./${{ matrix.asset_name }}
          gh release upload ${{ github.ref_name }} ./${{ matrix.asset_name }}
